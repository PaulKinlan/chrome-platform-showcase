<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 1rem; font-family: ui-monospace, monospace; font-size: 0.85rem; background: #fdfcf8; color: #000; }
    .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin-bottom: 0.4rem; }
    input[type=text] { display: block; width: 100%; padding: 0.45rem 0.6rem; margin-bottom: 0.75rem; border: 2px solid #000; font-family: ui-monospace, monospace; font-size: 0.85rem; background: #fff; color: #000; }
    input[type=text]:focus { outline: 3px solid #0022ff; outline-offset: 2px; }
    .status { padding: 0.4rem 0.6rem; border: 2px solid #000; font-size: 0.82rem; margin-bottom: 0.5rem; min-height: 2rem; }
    .ok   { background: #d1fae5; color: #065f46; }
    .fail { background: #fee2e2; color: #7f1d1d; }
    .wait { background: #fef3c7; color: #78350f; }
    #log { max-height: 90px; overflow-y: auto; font-size: 0.73rem; color: #666; border-top: 1px solid #ccc; padding-top: 0.4rem; }
    #log p { margin: 0.1rem 0; }
  </style>
</head>
<body>
  <p class="label">Keyboard target</p>
  <input id="target" type="text" placeholder="Watches for focus…" readonly />
  <div id="status" class="status wait">Waiting for first attempt…</div>
  <div id="log"></div>
  <script>
    const target = document.getElementById('target');
    const status = document.getElementById('status');
    const log = document.getElementById('log');
    let n = 0;
    function attempt() {
      n++;
      target.focus();
      const focused = document.activeElement === target;
      const msg = `#${n} focus() → ${focused ? 'FOCUSED ✓' : 'blocked ✗'}`;
      status.textContent = msg;
      status.className = 'status ' + (focused ? 'ok' : 'fail');
      const p = document.createElement('p');
      p.textContent = msg;
      log.prepend(p);
    }
    setTimeout(attempt, 600);
    setInterval(attempt, 2500);
  </script>
</body>
</html>
