<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      background: var(--bg-ivory);
      color: var(--text-black);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      margin: 0;
      padding: 1rem;
    }

    .label {
      color: var(--text-muted);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
    }

    input[type="text"] {
      background: var(--bg-paper);
      border: 2px solid var(--border-black);
      color: var(--text-black);
      display: block;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      margin-bottom: 0.65rem;
      padding: 0.45rem 0.6rem;
      width: 100%;
    }

    input[type="text"]:focus {
      outline: 3px solid var(--accent-blue);
      outline-offset: 2px;
    }

    .status {
      background: var(--bg-stone);
      border: 2px solid var(--border-black);
      color: var(--text-charcoal);
      margin-bottom: 0.65rem;
      min-height: 2.25rem;
      padding: 0.4rem 0.6rem;
    }

    .status.ok {
      border-color: var(--accent-emerald);
      color: var(--accent-emerald);
    }

    .status.fail {
      border-color: var(--accent-rose);
      color: var(--accent-rose);
    }

    .control-grid {
      display: grid;
      gap: 0.35rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 0.65rem;
    }

    button {
      background: var(--text-black);
      border: 2px solid var(--border-black);
      color: var(--bg-ivory);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      min-height: 2rem;
      padding: 0.35rem 0.45rem;
    }

    button.secondary {
      background: var(--bg-stone);
      color: var(--text-charcoal);
    }

    dialog,
    [popover] {
      background: var(--bg-paper);
      border: 2px solid var(--border-black);
      color: var(--text-black);
      font-family: var(--font-mono);
      padding: 0.75rem;
    }

    #log {
      border-top: 1px solid var(--border-black);
      color: var(--text-muted);
      font-size: 0.7rem;
      max-height: 90px;
      overflow-y: auto;
      padding-top: 0.4rem;
    }

    #log p {
      margin: 0.1rem 0;
    }
  </style>
</head>
<body>
  <p class="label" id="frame-label">Frame</p>
  <input id="target" type="text" placeholder="scripted focus target" readonly>
  <input id="user-target" type="text" placeholder="click here: user focus still works">
  <div id="status" class="status">Waiting for focus attempt...</div>
  <div class="control-grid">
    <button type="button" data-action="element-focus">element.focus</button>
    <button type="button" data-action="window-focus">window.focus</button>
    <button type="button" data-action="autofocus">autofocus</button>
    <button type="button" data-action="dialog">showModal</button>
    <button type="button" data-action="popover">showPopover</button>
    <button type="button" class="secondary" id="clear">clear</button>
  </div>
  <dialog id="test-dialog">
    <p>Dialog focus target</p>
    <input id="dialog-input" type="text" placeholder="dialog input">
    <button type="button" id="close-dialog">close</button>
  </dialog>
  <div id="test-popover" popover>
    <p>Popover focus target</p>
    <input id="popover-input" type="text" placeholder="popover input" autofocus>
  </div>
  <div id="log"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const channel = params.get("channel") || "unknown";
    const target = document.getElementById("target");
    const userTarget = document.getElementById("user-target");
    const status = document.getElementById("status");
    const log = document.getElementById("log");
    const dialog = document.getElementById("test-dialog");
    const dialogInput = document.getElementById("dialog-input");
    const popover = document.getElementById("test-popover");
    const popoverInput = document.getElementById("popover-input");
    const label = document.getElementById("frame-label");
    let attempts = 0;

    label.textContent = `${channel} frame`;

    function policyReport() {
      const policy = document.permissionsPolicy || document.featurePolicy;
      if (!policy || typeof policy.allowsFeature !== "function") {
        return { allows: null, source: "policy introspection unavailable" };
      }
      try {
        return {
          allows: policy.allowsFeature("focus-without-user-activation"),
          source: policy === document.permissionsPolicy ? "document.permissionsPolicy" : "document.featurePolicy",
        };
      } catch (error) {
        return { allows: null, source: `allowsFeature error: ${error.name}` };
      }
    }

    function activeDescription() {
      const active = document.activeElement;
      if (!active) return "none";
      return `${active.tagName.toLowerCase()}${active.id ? `#${active.id}` : ""}`;
    }

    function setStatus(action, focused, userInitiated = false) {
      attempts++;
      const active = activeDescription();
      status.textContent =
        `${action}: ${focused ? "focused" : "blocked or unchanged"}; active=${active}`;
      status.className = `status ${focused ? "ok" : "fail"}`;
      const line = document.createElement("p");
      line.textContent = `${attempts}. ${status.textContent}`;
      log.prepend(line);
      parent.postMessage({
        type: "focus-frame-result",
        channel,
        action,
        focused,
        active,
        userInitiated,
      }, location.origin);
    }

    function cleanGenerated() {
      document.querySelectorAll("[data-generated]").forEach((node) => node.remove());
      if (dialog.open) dialog.close();
      if (popover.matches(":popover-open")) popover.hidePopover();
    }

    function reportAfterFrame(action, test, userInitiated = false) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => setStatus(action, test(), userInitiated));
      });
    }

    function runAttempt(action, userInitiated = false) {
      cleanGenerated();
      if (action === "element-focus") {
        target.focus();
        reportAfterFrame(action, () => document.activeElement === target, userInitiated);
        return;
      }
      if (action === "window-focus") {
        window.focus();
        reportAfterFrame(action, () => document.hasFocus(), userInitiated);
        return;
      }
      if (action === "autofocus") {
        const input = document.createElement("input");
        input.type = "text";
        input.autofocus = true;
        input.id = `generated-autofocus-${attempts + 1}`;
        input.name = input.id;
        input.placeholder = "generated autofocus target";
        input.dataset.generated = "true";
        document.body.insertBefore(input, status);
        reportAfterFrame(action, () => document.activeElement === input, userInitiated);
        return;
      }
      if (action === "dialog") {
        if (typeof dialog.showModal !== "function") {
          setStatus(action, false, userInitiated);
          return;
        }
        dialog.showModal();
        dialogInput.focus();
        reportAfterFrame(action, () => dialog.open && document.activeElement === dialogInput, userInitiated);
        return;
      }
      if (action === "popover") {
        if (typeof popover.showPopover !== "function") {
          setStatus(action, false, userInitiated);
          return;
        }
        popover.showPopover();
        popoverInput.focus();
        reportAfterFrame(action, () => popover.matches(":popover-open") && document.activeElement === popoverInput, userInitiated);
      }
    }

    document.querySelectorAll("[data-action]").forEach((button) => {
      button.addEventListener("click", () => {
        const action = button.dataset.action;
        status.textContent = `${action}: queued as automated timer attempt`;
        setTimeout(() => runAttempt(action, false), 1600);
      });
    });

    userTarget.addEventListener("focus", () => {
      setStatus("user click focus", document.activeElement === userTarget, true);
    });

    document.getElementById("clear").addEventListener("click", () => {
      log.textContent = "";
      status.textContent = "Log cleared.";
      status.className = "status";
    });

    document.getElementById("close-dialog").addEventListener("click", () => {
      if (dialog.open) dialog.close();
    });

    window.addEventListener("message", (event) => {
      if (event.origin !== location.origin) return;
      const data = event.data || {};
      if (data.type === "run-focus-test") {
        runAttempt(data.action, false);
      }
    });

    parent.postMessage({
      type: "focus-frame-ready",
      channel,
      policy: policyReport(),
    }, location.origin);

    setTimeout(() => runAttempt("element-focus", false), 700);
  </script>
</body>
</html>
