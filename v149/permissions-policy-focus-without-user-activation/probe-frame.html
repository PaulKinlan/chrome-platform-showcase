<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0.75rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      background: #fdfcf8;
      color: #111;
    }
    .label {
      font-size: 0.68rem;
      color: #666;
      margin: 0 0 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input {
      display: block;
      width: 100%;
      padding: 0.45rem 0.55rem;
      border: 2px solid #111;
      background: #fff;
      color: #111;
      font: inherit;
      margin-bottom: 0.45rem;
    }
    input:focus { outline: 3px solid #0022ff; outline-offset: 2px; }
    button {
      padding: 0.35rem 0.55rem;
      border: 2px solid #111;
      background: #111;
      color: #fff;
      font: inherit;
      cursor: pointer;
      margin-bottom: 0.45rem;
    }
    .status {
      border: 2px solid #111;
      padding: 0.35rem 0.45rem;
      min-height: 1.8rem;
      margin-bottom: 0.4rem;
    }
    .ok { background: #d1fae5; color: #065f46; }
    .blocked { background: #fee2e2; color: #7f1d1d; }
    .idle { background: #fef3c7; color: #78350f; }
    #log {
      max-height: 58px;
      overflow-y: auto;
      border-top: 1px solid #ccc;
      padding-top: 0.35rem;
      color: #555;
      font-size: 0.68rem;
    }
    #log p { margin: 0.1rem 0; }
  </style>
</head>
<body>
  <p class="label" id="label">focus probe iframe</p>
  <input id="target" type="text" placeholder="Target input inside iframe">
  <button id="user-focus" type="button">User focus inside frame</button>
  <div class="status idle" id="status">Waiting for parent command…</div>
  <div id="log"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const channel = params.get('channel') || 'probe';
    const label = document.getElementById('label');
    const target = document.getElementById('target');
    const status = document.getElementById('status');
    const log = document.getElementById('log');
    let attempts = 0;

    label.textContent = `${channel} focus probe iframe`;

    function addLog(message) {
      const p = document.createElement('p');
      p.textContent = message;
      log.prepend(p);
      while (log.children.length > 6) log.removeChild(log.lastChild);
    }

    function report(action, focused) {
      parent.postMessage({
        type: 'focus-policy-result',
        channel,
        action,
        focused,
        attempts,
        at: new Date().toISOString(),
      }, '*');
    }

    function attemptFocus(action) {
      attempts++;
      target.focus();
      const focused = document.activeElement === target;
      status.textContent = `#${attempts} ${action}: ${focused ? 'focused' : 'blocked'}`;
      status.className = `status ${focused ? 'ok' : 'blocked'}`;
      addLog(`${action} -> ${focused ? 'focused' : 'blocked'}`);
      report(action, focused);
    }

    document.getElementById('user-focus').addEventListener('click', () => {
      attemptFocus('user activation inside iframe');
    });

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (data.type === 'focus-now') {
        attemptFocus(data.action || 'programmatic focus');
      }
      if (data.type === 'focus-delayed') {
        const delay = Number(data.delay ?? 500);
        addLog(`timer scheduled for ${delay} ms`);
        setTimeout(() => attemptFocus(data.action || `timer ${delay} ms focus`), delay);
      }
    });

    parent.postMessage({
      type: 'focus-policy-ready',
      channel,
      at: new Date().toISOString(),
    }, '*');
  </script>
</body>
</html>
