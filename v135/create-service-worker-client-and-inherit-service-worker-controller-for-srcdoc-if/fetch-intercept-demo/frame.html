<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>src iframe fetch probe</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    * { box-sizing: border-box; }

    body {
      background: var(--bg-paper);
      color: var(--text-black);
      font-family: system-ui, sans-serif;
      font-size: 0.86rem;
      margin: 0;
      padding: 12px;
    }

    .badge {
      background: var(--bg-stone);
      border: 1px solid var(--border-black);
      display: inline-block;
      margin: 0 0 8px;
      padding: 2px 6px;
    }

    .result {
      border: 1px solid var(--border-black);
      border-left: 6px solid var(--accent-amber);
      margin: 0;
      padding: 8px;
    }

    .result.ok { border-left-color: var(--accent-emerald); }
    .result.fail { border-left-color: var(--accent-rose); }

    code {
      background: var(--bg-stone);
      font-family: var(--font-mono);
      padding: 1px 4px;
    }
  </style>
</head>
<body>
  <strong>regular src iframe</strong>
  <p class="badge" id="controller">controller: checking</p>
  <p class="result" id="result">fetching <code>./sw-echo</code></p>
  <script>
  (() => {
    const params = new URLSearchParams(location.search);
    const runId = params.get("run") || String(Date.now());
    const source = params.get("source") || "src-frame";
    const endpoint = new URL("./sw-echo", location.href);
    endpoint.searchParams.set("source", source);
    endpoint.searchParams.set("run", runId);

    const controller = Boolean(navigator.serviceWorker && navigator.serviceWorker.controller);
    document.getElementById("controller").textContent = "controller: " + (controller ? "present" : "missing");

    async function run() {
      try {
        const response = await fetch(endpoint, { cache: "no-store" });
        const text = await response.text();
        let json = null;
        try {
          json = JSON.parse(text);
        } catch {
          // Network fallbacks are plain text 404s.
        }
        const header = response.headers.get("x-sw-intercepted") || "missing";
        const resultEl = document.getElementById("result");
        resultEl.className = "result " + (header === "true" ? "ok" : "fail");
        resultEl.textContent = "x-sw-intercepted: " + header + " | status: " + response.status;
        parent.postMessage({
          type: "frame-fetch-result",
          body: json ?? text.slice(0, 500),
          controller,
          frame: "src-frame",
          interceptedHeader: header,
          ok: response.ok,
          runId,
          source,
          status: response.status,
        }, location.origin);
      } catch (error) {
        document.getElementById("result").className = "result fail";
        document.getElementById("result").textContent = "fetch failed: " + error.message;
        parent.postMessage({
          type: "frame-fetch-result",
          controller,
          error: error.message,
          frame: "src-frame",
          interceptedHeader: "missing",
          ok: false,
          runId,
          source,
          status: 0,
        }, location.origin);
      }
    }

    run();
  })();
  </script>
</body>
</html>
