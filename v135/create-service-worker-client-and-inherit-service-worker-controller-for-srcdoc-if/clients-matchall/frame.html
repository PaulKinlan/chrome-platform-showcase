<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    body {
      background: var(--bg-paper);
      color: var(--text-black);
      font-family: var(--font-mono);
      font-size: 13px;
      margin: 0;
      padding: 12px;
    }

    .badge {
      background: var(--bg-stone);
      border: 1px solid var(--border-black);
      display: inline-block;
      margin-top: 8px;
      padding: 3px 6px;
    }
  </style>
</head>
<body>
  <strong>src frame</strong>
  <p>Regular same-origin iframe loaded from <code>frame.html</code>.</p>
  <span class="badge" id="status">checking controller</span>
  <script>
    const params = new URLSearchParams(location.search);
    const frameName = params.get('frame') || 'src';
    const status = document.getElementById('status');

    function hasController() {
      return Boolean(navigator.serviceWorker && navigator.serviceWorker.controller);
    }

    function report(type, extra = {}) {
      parent.postMessage({
        type,
        frame: frameName,
        controller: hasController(),
        url: location.href,
        ...extra,
      }, '*');
    }

    status.textContent = 'controller: ' + (hasController() ? 'present' : 'missing');
    report('frame-ready');

    if (navigator.serviceWorker) {
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (!event.data || event.data.type !== 'sw-broadcast') return;
        status.textContent = 'worker message: ' + event.data.text;
        report('frame-sw-message', {
          requestId: event.data.requestId,
          text: event.data.text,
        });
      });
    }
  </script>
</body>
</html>
