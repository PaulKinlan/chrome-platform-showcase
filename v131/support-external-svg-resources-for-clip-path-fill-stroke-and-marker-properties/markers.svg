<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="solid"
      viewBox="0 0 10 10"
      refX="9"
      refY="5"
      markerWidth="8"
      markerHeight="8"
      orient="auto"
    >
      <path d="M0,0 L10,5 L0,10 z" fill="black" />
    </marker>
    <marker
      id="open"
      viewBox="0 0 10 10"
      refX="9"
      refY="5"
      markerWidth="8"
      markerHeight="8"
      orient="auto"
    >
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="black" stroke-width="1.5" />
    </marker>
    <marker
      id="diamond"
      viewBox="0 0 12 10"
      refX="11"
      refY="5"
      markerWidth="10"
      markerHeight="8"
      orient="auto"
    >
      <path d="M0,5 L6,0 L12,5 L6,10 z" fill="#0022ff" />
    </marker>
    <marker
