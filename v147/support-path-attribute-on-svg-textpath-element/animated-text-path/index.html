<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Animated Text Path — SVG textPath — Chrome 147</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    .controls-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: var(--space-2) var(--space-4);
      align-items: center;
      margin-bottom: var(--space-5);
      background: var(--bg-paper);
      border: 2px solid var(--border-black);
      padding: var(--space-4);
      box-shadow: var(--flat-shadow);
    }
    .controls-grid label {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-charcoal);
      white-space: nowrap;
    }
    .controls-grid input[type=range] { width: 100%; }
    .controls-grid input[type=text] {
      width: 100%;
      border: 1px solid var(--border-black);
      padding: var(--space-1) var(--space-2);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      background: var(--bg-ivory);
      color: var(--text-black);
    }
    .shape-btns {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      grid-column: 1 / -1;
    }
    .shape-btn {
      background: var(--bg-paper);
      color: var(--text-black);
      border: 2px solid var(--border-black);
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      cursor: pointer;
    }
    .shape-btn:hover { background: var(--bg-stone); }
    .shape-btn.active { background: var(--text-black); color: var(--bg-ivory); }

    .svg-stage {
      border: 2px solid var(--border-black);
      background: var(--bg-ivory);
      box-shadow: var(--flat-shadow);
      margin-bottom: var(--space-5);
      overflow: visible;
    }
    .path-guide {
      fill: none;
      stroke: var(--border-black);
      stroke-width: 1;
      stroke-dasharray: 4 3;
      opacity: 0.3;
    }
    .path-text {
      font-family: Georgia, serif;
      fill: var(--text-black);
      dominant-baseline: auto;
    }
    .path-text textPath {
      animation: slide-along linear infinite;
    }
    @keyframes slide-along {
      from { startOffset: -60%; }
      to   { startOffset: 100%; }
    }

    .play-pause {
      background: var(--text-black);
      color: var(--bg-ivory);
      border: 2px solid var(--border-black);
      padding: var(--space-2) var(--space-4);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      cursor: pointer;
      margin-bottom: var(--space-3);
    }
    .play-pause:hover { background: var(--text-charcoal); color: var(--bg-ivory); }

    .code-block {
      background: var(--text-black);
      color: var(--bg-ivory);
      padding: var(--space-4);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.6;
      border: 2px solid var(--border-black);
      overflow-x: auto;
      margin-bottom: var(--space-5);
    }
    .val-display {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<main>
  <p class="crumbs"><a href="/v147/">&larr; Chrome 147</a> / <a href="../">SVG textPath path attribute</a></p>

  <header class="lede-block">
    <p class="eyebrow">v147 · Animated Text Path</p>
    <h1>Animated Text Path</h1>
    <p class="lede">Animate text flowing along inline SVG paths using the new <code>path</code> attribute on <code>&lt;textPath&gt;</code>. Pick a shape, adjust font size and speed, and watch the text scroll continuously along the curve.</p>
  </header>

  <div class="controls-grid">
    <label>Text</label>
    <input type="text" id="txt-input" value="Chrome 147 · SVG textPath path attribute · animate along any shape · " maxlength="200">

    <label>Font size <span class="val-display" id="fs-val">24px</span></label>
    <input type="range" id="fs-slider" min="10" max="48" value="24" oninput="updateSize(this.value)">

    <label>Speed <span class="val-display" id="speed-val">12s</span></label>
    <input type="range" id="speed-slider" min="3" max="40" value="12" oninput="updateSpeed(this.value)">

    <label>Path shape</label>
    <div class="shape-btns">
      <button class="shape-btn active" onclick="setShape('wave', this)">Wave</button>
      <button class="shape-btn" onclick="setShape('circle', this)">Circle</button>
      <button class="shape-btn" onclick="setShape('arch', this)">Arch</button>
      <button class="shape-btn" onclick="setShape('zigzag', this)">Zigzag</button>
      <button class="shape-btn" onclick="setShape('loop', this)">Loop</button>
    </div>
  </div>

  <button class="play-pause" id="play-btn" onclick="togglePlay()">⏸ Pause</button>

  <div>
    <svg class="svg-stage" id="svg-stage" viewBox="0 0 800 240" width="100%" height="240">
      <defs>
        <path id="anim-path" d=""/>
      </defs>
      <path class="path-guide" id="guide-path" d=""/>
      <text class="path-text" id="path-text" font-size="24">
        <textPath id="text-path-el" href="#anim-path" startOffset="0%">
          Chrome 147 · SVG textPath path attribute · animate along any shape ·&#xA0;
        </textPath>
      </text>
    </svg>
  </div>

  <h2>live code</h2>
  <pre class="code-block" id="live-code"></pre>
</main>

<script>
const shapes = {
  wave: {
    viewBox: '0 0 800 240',
    height: 240,
    d: 'M 0,120 C 100,40 200,200 400,120 C 600,40 700,200 800,120',
    textY: null,
  },
  circle: {
    viewBox: '0 0 800 260',
    height: 260,
    d: 'M 400,30 A 190,190 0 1 1 399.9,30 Z',
    textY: null,
  },
  arch: {
    viewBox: '0 0 800 200',
    height: 200,
    d: 'M 40,180 Q 400,20 760,180',
    textY: null,
  },
  zigzag: {
    viewBox: '0 0 800 240',
    height: 240,
    d: 'M 0,180 L 100,60 L 200,180 L 300,60 L 400,180 L 500,60 L 600,180 L 700,60 L 800,180',
    textY: null,
  },
  loop: {
    viewBox: '0 0 800 240',
    height: 240,
    d: 'M 40,120 C 40,40 200,40 200,120 C 200,200 360,200 400,120 C 440,40 560,40 600,120 C 640,200 760,200 760,120',
    textY: null,
  },
};

let currentShape = 'wave';
let playing = true;
let fontSize = 24;
let duration = 12;

function setShape(name, btn) {
  currentShape = name;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyShape();
}

function applyShape() {
  const s = shapes[currentShape];
  const svg = document.getElementById('svg-stage');
  svg.setAttribute('viewBox', s.viewBox);
  svg.setAttribute('height', s.height);
  document.getElementById('anim-path').setAttribute('d', s.d);
  document.getElementById('guide-path').setAttribute('d', s.d);
  updateCode();
}

function updateSize(v) {
  fontSize = parseInt(v);
  document.getElementById('fs-val').textContent = v + 'px';
  document.getElementById('path-text').setAttribute('font-size', v);
  updateCode();
}

function updateSpeed(v) {
  duration = parseInt(v);
  document.getElementById('speed-val').textContent = v + 's';
  const el = document.querySelector('.path-text textPath');
  el.style.animationDuration = v + 's';
  updateCode();
}

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('play-btn');
  const el = document.querySelector('.path-text textPath');
  if (playing) {
    el.style.animationPlayState = 'running';
    btn.textContent = '⏸ Pause';
  } else {
    el.style.animationPlayState = 'paused';
    btn.textContent = '▶ Play';
  }
}

document.getElementById('txt-input').addEventListener('input', (e) => {
  const el = document.getElementById('text-path-el');
  el.textContent = e.target.value || ' ';
  updateCode();
});

function updateCode() {
  const s = shapes[currentShape];
  const txt = document.getElementById('txt-input').value || ' ';
  document.getElementById('live-code').textContent = `<svg viewBox="${s.viewBox}">
  <defs>
    <!-- Chrome 147: path attribute directly on textPath -->
    <!-- No separate <path id="..."> needed! -->
  </defs>

  <text font-size="${fontSize}">
    <textPath
      path="${s.d}"
      startOffset="0%"
      style="animation: slide-along ${duration}s linear infinite;">
      ${txt}
    </textPath>
  </text>
</svg>

<style>
  @keyframes slide-along {
    from { startOffset: -60%; }
    to   { startOffset: 100%; }
  }
</style>`;
}

window.addEventListener('DOMContentLoaded', () => {
  applyShape();
  updateCode();
  // Set initial animation duration
  document.querySelector('.path-text textPath').style.animationDuration = duration + 's';
});
</script>
</body>
</html>
