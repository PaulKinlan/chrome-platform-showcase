<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adapter Probe — WebNN — Chrome 147 — chrome platform showcase</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--space-3); margin: var(--space-4) 0; }
    .card { background: var(--bg-paper); border: 2px solid var(--border-black); box-shadow: var(--thin-shadow); padding: var(--space-4); display: flex; flex-direction: column; gap: 0.4rem; }
    .card h3 { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 0; }
    .card .name { font-family: var(--font-display); font-size: 1.4rem; color: var(--text-black); margin: 0; }
    .card .verdict { display: inline-block; padding: 0.2rem 0.5rem; font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border: 1px solid var(--border-black); width: max-content; }
    .card .verdict.ok { background: color-mix(in srgb, var(--accent-emerald, #0a6e3f) 14%, var(--bg-paper)); color: var(--accent-emerald, #0a6e3f); border-color: var(--accent-emerald, #0a6e3f); }
    .card .verdict.bad { background: color-mix(in srgb, var(--accent-rose) 14%, var(--bg-paper)); color: var(--accent-rose); border-color: var(--accent-rose); }
  </style>
</head>
<body>
<main>
  <p class="crumbs"><a href="../">&larr; WebNN</a></p>

  <header class="lede-block">
    <p class="eyebrow">demo · v147</p>
    <h1>Adapter Probe</h1>
    <p class="lede">Three context types, three quick probes. Each tries to create a WebNN context for that device type and reports back.</p>
  </header>

  <div class="grid" id="grid"></div>

  <section>
    <h2>see also</h2>
    <ul>
      <li><a href="../">WebNN</a> — feature index</li>
      <li><a href="https://chromestatus.com/feature/5176273954144256" target="_blank" rel="noopener">ChromeStatus entry</a></li>
    </ul>
  </section>

  <footer class="byline">made by <a href="https://paul.kinlan.me/" target="_blank" rel="noopener">Paul Kinlan</a></footer>
</main>

<script>
const grid = document.getElementById("grid");
const deviceTypes = ["cpu", "gpu", "npu"];
for (const dt of deviceTypes) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h3>device type</h3><p class="name">${dt}</p><span class="verdict" id="v-${dt}">…</span>`;
  grid.appendChild(card);
}

(async () => {
  if (!navigator.ml) {
    for (const dt of deviceTypes) {
      const v = document.getElementById(`v-${dt}`);
      v.className = "verdict bad";
      v.textContent = "navigator.ml not available";
    }
    return;
  }
  for (const dt of deviceTypes) {
    const v = document.getElementById(`v-${dt}`);
    try {
      const ctx = await navigator.ml.createContext({ deviceType: dt });
      v.className = "verdict ok";
      v.textContent = "context created";
    } catch (e) {
      v.className = "verdict bad";
      v.textContent = e.message.length > 36 ? e.message.slice(0, 33) + "…" : e.message;
    }
  }
})();
</script>
</body>
</html>
