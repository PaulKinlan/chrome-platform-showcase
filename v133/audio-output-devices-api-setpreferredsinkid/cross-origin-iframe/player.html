<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>embedded player</title>
  <style>
    body { margin: 0; padding: 12px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; background: #fdfcf8; color: #000; }
    audio { width: 100%; margin-top: 8px; }
    .id { color: #666; font-size: 11px; }
  </style>
</head>
<body>
  <p>iframe player &mdash; will use the parent's preferred sink by default</p>
  <audio id="a" controls>
    <source src="data:audio/wav;base64,UklGRkAAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YRwAAACAgICAgICAgICAgICAgICAgICAgICAgICAgIA=" type="audio/wav">
  </audio>
  <p class="id" id="status">current sinkId: (default)</p>
  <script>
    const a = document.getElementById("a");
    const s = document.getElementById("status");
    function probe() {
      const id = a.sinkId || "(default)";
      s.textContent = "current sinkId: " + (id.length > 14 ? id.slice(0, 8) + "…" : id);
    }
    a.addEventListener("loadedmetadata", probe);
    probe();
    window.addEventListener("message", (e) => {
      if (e.data?.kind === "reload") {
        // Recreate the audio element so it picks up the new preferred sink
        const n = a.cloneNode(true);
        a.replaceWith(n);
        setTimeout(probe, 50);
      }
    });
  </script>
</body>
</html>
