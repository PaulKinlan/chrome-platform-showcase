<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>embedded player</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    body { margin: 0; padding: 12px; font-family: var(--font-mono); font-size: 13px; background: var(--bg-ivory); color: var(--text-black); }
    audio { width: 100%; margin-top: 8px; }
    .id { color: var(--text-muted); font-size: 11px; }
  </style>
</head>
<body>
  <p>iframe player &mdash; will use the parent's preferred sink by default</p>
  <audio id="a" controls>
    <source src="data:audio/wav;base64,UklGRkAAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YRwAAACAgICAgICAgICAgICAgICAgICAgICAgICAgIA=" type="audio/wav">
  </audio>
  <p class="id" id="status">current sinkId: (default)</p>
  <script>
    const a = document.getElementById("a");
    const s = document.getElementById("status");
    function probe() {
      const id = a.sinkId || "(default)";
      s.textContent = "current sinkId: " + (id.length > 14 ? id.slice(0, 8) + "…" : id);
    }
    a.addEventListener("loadedmetadata", probe);
    probe();
  </script>
</body>
</html>
