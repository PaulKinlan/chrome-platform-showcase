<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>auto-preload probe page</title>
  <style>
    body { font-family: monospace; margin: 1rem; background: #fffef9; color: #16150f; }
  </style>
</head>
<body>
<p id="state">measuring…</p>
<script>
  // Report this navigation's real timing entry to the parent lab page.
  addEventListener("load", () => {
    // Let responseEnd/loadEventEnd settle.
    setTimeout(() => {
      const nav = performance.getEntriesByType("navigation")[0];
      const controlled = Boolean(navigator.serviceWorker && navigator.serviceWorker.controller);
      const payload = nav
        ? {
          kind: "autopreload-probe",
          controlled,
          workerStart: nav.workerStart,
          fetchStart: nav.fetchStart,
          requestStart: nav.requestStart,
          responseStart: nav.responseStart,
          responseEnd: nav.responseEnd,
          startTime: nav.startTime,
        }
        : { kind: "autopreload-probe", controlled, error: "no navigation entry" };
      document.getElementById("state").textContent = controlled
        ? "controlled by SW — timing reported"
        : "NOT controlled by SW — timing reported";
      parent.postMessage(payload, "*");
    }, 30);
  });
</script>
</body>
</html>
