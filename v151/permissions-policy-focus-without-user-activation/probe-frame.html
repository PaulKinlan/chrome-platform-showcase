<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>focus-without-user-activation probe frame</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0.75rem;
      background: var(--bg-paper);
      color: var(--text-black);
      font-family: var(--font-mono);
      font-size: 0.78rem;
    }
    .label {
      margin: 0 0 0.45rem;
      color: var(--text-muted);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    input {
      display: block;
      width: 100%;
      padding: 0.45rem 0.55rem;
      border: 2px solid var(--border-black);
      background: var(--bg-ivory);
      color: var(--text-black);
      font: inherit;
      margin-bottom: 0.45rem;
    }
    input:focus {
      outline: 3px solid var(--accent-blue);
      outline-offset: 2px;
    }
    button {
      margin-bottom: 0.45rem;
      padding: 0.35rem 0.55rem;
      font: inherit;
    }
    .status {
      min-height: 1.8rem;
      margin-bottom: 0.4rem;
      padding: 0.35rem 0.45rem;
      border: 2px solid var(--border-black);
      background: var(--bg-stone);
      color: var(--text-charcoal);
    }
    .ok { border-color: var(--accent-emerald); color: var(--accent-emerald); }
    .blocked { border-color: var(--accent-rose); color: var(--accent-rose); }
    #log {
      max-height: 58px;
      overflow-y: auto;
      border-top: 1px solid var(--border-black);
      padding-top: 0.35rem;
      color: var(--text-muted);
      font-size: 0.68rem;
    }
    #log p { margin: 0.1rem 0; }
  </style>
</head>
<body>
  <p class="label" id="label">focus probe iframe</p>
  <input id="target" type="text" placeholder="Target input inside iframe">
  <button id="user-focus" type="button">User focus inside frame</button>
  <div class="status" id="status">Waiting for parent command...</div>
  <div id="log"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const channel = params.get('channel') || 'probe';
    const labelText = params.get('label') || channel;
    const label = document.getElementById('label');
    const target = document.getElementById('target');
    const status = document.getElementById('status');
    const log = document.getElementById('log');
    let attempts = 0;

    label.textContent = `${labelText} focus probe iframe`;

    function addLog(message) {
      const p = document.createElement('p');
      p.textContent = message;
      log.prepend(p);
      while (log.children.length > 6) log.removeChild(log.lastChild);
    }

    function report(action, focused) {
      parent.postMessage({
        type: 'focus-policy-result',
        channel,
        action,
        focused,
        attempts,
        at: new Date().toISOString(),
      }, '*');
    }

    function attemptFocus(action) {
      attempts++;
      target.focus();
      const focused = document.activeElement === target;
      status.textContent = `#${attempts} ${action}: ${focused ? 'focused' : 'blocked'}`;
      status.className = `status ${focused ? 'ok' : 'blocked'}`;
      addLog(`${action} -> ${focused ? 'focused' : 'blocked'}`);
      report(action, focused);
    }

    document.getElementById('user-focus').addEventListener('click', () => {
      attemptFocus('user activation inside iframe');
    });

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (data.type === 'focus-now') {
        attemptFocus(data.action || 'programmatic focus');
      }
      if (data.type === 'focus-delayed') {
        const delay = Number(data.delay ?? 500);
        addLog(`timer scheduled for ${delay} ms`);
        setTimeout(() => attemptFocus(data.action || `timer ${delay} ms focus`), delay);
      }
    });

    parent.postMessage({
      type: 'focus-policy-ready',
      channel,
      at: new Date().toISOString(),
    }, '*');
  </script>
</body>
</html>
