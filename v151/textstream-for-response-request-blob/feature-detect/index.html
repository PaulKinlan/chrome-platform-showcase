<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feature Detect — textStream() — Chrome 151 — chrome platform showcase</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    .probe-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-3); margin: var(--space-4) 0; }
    .probe-cell { border: 2px solid var(--border-black); box-shadow: var(--thin-shadow); padding: var(--space-3); background: var(--bg-paper); }
    .probe-cell .label { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; }
    .probe-cell .value { font-family: var(--font-mono); font-size: 0.9rem; margin-top: var(--space-1); }
    .value.yes { color: var(--accent-emerald); }
    .value.no { color: var(--accent-rose); }
    .btn { padding: var(--space-2) var(--space-4); border: 2px solid var(--border-black); background: var(--accent-blue); color: var(--bg-ivory); font-size: 0.85rem; cursor: pointer; margin: var(--space-3) 0; }
  </style>
</head>
<body>
<main>
  <p class="crumbs"><a href="../">&larr; textStream()</a></p>
  <header class="lede-block">
    <p class="eyebrow">v151 · javascript · streams</p>
    <h1>Feature Detection</h1>
    <p class="lede">Check whether <code>textStream()</code> exists on Blob, Response, and Request.</p>
  </header>
  <button class="btn" id="probe-btn">Run detection</button>
  <div class="probe-grid" id="grid"></div>
  <section><h2>references</h2><ul>
    <li><a href="https://chromestatus.com/feature/5146752165478400" target="_blank" rel="noopener">ChromeStatus entry</a></li>
    <li><a href="https://github.com/whatwg/fetch/pull/1862" target="_blank" rel="noopener">Fetch spec PR</a></li>
  </ul></section>
  <footer class="byline">made by <a href="https://paul.kinlan.me/" target="_blank" rel="noopener">Paul Kinlan</a></footer>
</main>
<script>
(function () {
  const targets = [
    { name: "Blob.prototype.textStream", check: function () { return typeof new Blob([]).textStream; } },
    { name: "Response.prototype.textStream", check: function () { return typeof new Response("").textStream; } },
    { name: "Request.prototype.textStream", check: function () { return typeof new Request("data:,").textStream; } },
  ];
  document.getElementById("probe-btn").addEventListener("click", function () {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    targets.forEach(function (t) {
      var v = t.check();
      var div = document.createElement("div");
      div.className = "probe-cell";
      div.innerHTML = '<div class="label">' + t.name + '</div><div class="value ' + (v === "function" ? "yes" : "no") + '">' + (v === "function" ? "✓ function" : "✗ " + v) + "</div>";
      grid.appendChild(div);
    });
  });
})();
</script>
</body>
</html>
