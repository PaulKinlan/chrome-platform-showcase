<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feature Detect — Speculation Rules — Chrome 151 — chrome platform showcase</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    .probe-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--space-3); margin: var(--space-4) 0; }
    .probe-cell { border: 2px solid var(--border-black); box-shadow: var(--thin-shadow); padding: var(--space-3); background: var(--bg-paper); }
    .probe-cell .label { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; }
    .probe-cell .value { font-family: var(--font-mono); font-size: 0.9rem; margin-top: var(--space-1); }
    .value.yes { color: var(--accent-emerald); } .value.no { color: var(--accent-rose); }
    .btn { padding: var(--space-2) var(--space-4); border: 2px solid var(--border-black); background: var(--accent-blue); color: var(--bg-ivory); font-size: 0.85rem; cursor: pointer; margin: var(--space-3) 0; }
  </style>
</head>
<body>
<main>
  <p class="crumbs"><a href="../">&larr; Speculation Rules</a></p>
  <header class="lede-block">
    <p class="eyebrow">v151 · performance · prerendering</p>
    <h1>Feature Detection</h1>
    <p class="lede">Check whether speculation rules are supported, whether the <code>form_submission</code> field is accepted, and inspect any active prerendering entries.</p>
  </header>
  <button class="btn" id="probe-btn">Run probe</button>
  <div class="probe-grid" id="grid"></div>
  <section><h2>references</h2><ul>
    <li><a href="https://chromestatus.com/feature/5074313831120896" target="_blank" rel="noopener">ChromeStatus entry</a></li>
    <li><a href="https://wicg.github.io/nav-speculation/prerendering.html" target="_blank" rel="noopener">Nav Speculation spec</a></li>
  </ul></section>
  <footer class="byline">made by <a href="https://paul.kinlan.me/" target="_blank" rel="noopener">Paul Kinlan</a></footer>
</main>
<script>
(function () {
  document.getElementById("probe-btn").addEventListener("click", function () {
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    var checks = [
      { name: "HTMLScriptElement.type = speculationrules", check: function () { var s = document.createElement("script"); s.type = "speculationrules"; return s.type === "speculationrules" ? "supported" : "no"; } },
      { name: "document.prerendering", check: function () { return typeof document.prerendering; } },
      { name: "PerformanceObserver: speculation-rules", check: function () { try { return PerformanceObserver.supportedEntryTypes.indexOf(" speculation-rules") >= 0 ? "yes" : "not in list"; } catch (e) { return "error"; } } },
    ];
    checks.forEach(function (c) {
      var v = c.check();
      var div = document.createElement("div");
      div.className = "probe-cell";
      div.innerHTML = '<div class="label">' + c.name + '</div><div class="value ' + (v === "supported" || v === "function" || v === "yes" ? "yes" : "no") + '">' + v + "</div>";
      grid.appendChild(div);
    });
  });
})();
</script>
</body>
</html>
