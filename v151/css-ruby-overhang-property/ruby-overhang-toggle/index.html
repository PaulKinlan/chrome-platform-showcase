<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ruby Overhang Toggle — CSS ruby-overhang — Chrome 151 — chrome platform showcase</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    .stage {
      background: var(--bg-paper);
      border: 2px solid var(--border-black);
      box-shadow: var(--thin-shadow);
      padding: var(--space-5);
      margin: var(--space-4) 0;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: 2rem;
      line-height: 2.4;
      color: var(--text-black);
    }
    .stage rt { font-size: 0.55em; color: var(--text-muted); }
    .stage[data-mode=auto] ruby { ruby-overhang: auto; }
    .stage[data-mode=spaces] ruby { ruby-overhang: spaces; }
    .stage[data-mode=none] ruby { ruby-overhang: none; }

    .buttons { display: flex; gap: 0.5rem; margin: var(--space-3) 0; flex-wrap: wrap; }
    .seg {
      background: var(--bg-paper); color: var(--text-black);
      border: 2px solid var(--border-black); box-shadow: var(--thin-shadow);
      padding: 0.4rem 1rem; font-family: var(--font-mono); font-size: 0.85rem;
      cursor: pointer;
    }
    .seg[aria-pressed=true] { background: var(--accent-blue); color: var(--bg-ivory); border-color: var(--accent-blue); }
  </style>
</head>
<body>
<main>
  <p class="crumbs"><a href="../">&larr; CSS ruby-overhang property</a></p>

  <header class="lede-block">
    <p class="eyebrow">demo · v151</p>
    <h1>Ruby Overhang Toggle</h1>
    <p class="lede">Watch the spacing change as you toggle.</p>
  </header>

  <div class="buttons" id="buttons">
    <button class="seg" data-v="auto" aria-pressed="true">auto</button>
    <button class="seg" data-v="spaces">spaces</button>
    <button class="seg" data-v="none">none</button>
  </div>

  <div class="stage" id="stage" data-mode="auto">
    今日<ruby>桜<rt>さくら</rt></ruby>は満開です。<br>
    <ruby>東京<rt>とうきょう</rt></ruby>から<ruby>京都<rt>きょうと</rt></ruby>まで新幹線で<ruby>二時間<rt>にじかん</rt></ruby>です。
  </div>

  <section>
    <h2>see also</h2>
    <ul>
      <li><a href="../">CSS ruby-overhang property</a> — feature index</li>
      <li><a href="https://chromestatus.com/feature/6560118298771456" target="_blank" rel="noopener">ChromeStatus entry</a></li>
    </ul>
  </section>

  <footer class="byline">made by <a href="https://paul.kinlan.me/" target="_blank" rel="noopener">Paul Kinlan</a></footer>
</main>

<script>
const stage = document.getElementById("stage");
document.getElementById("buttons").addEventListener("click", (e) => {
  if (!(e.target instanceof HTMLButtonElement)) return;
  for (const b of document.querySelectorAll(".seg")) b.setAttribute("aria-pressed", "false");
  e.target.setAttribute("aria-pressed", "true");
  stage.dataset.mode = e.target.dataset.v;
});
</script>
</body>
</html>
