</style></head><body><main><p class="crumbs"><a href="/v152/css-image-animation/">&larr; CSS Image Animation</a></p><header class="lede-block"><p class="eyebrow">v152 · interactive demo</p><h1>Playback Lab</h1><p class="lede">Control an external animated SVG with the exact image-animation property.</p></header><section class="demo-card lab"><div class="note" id="support-note"></div><div class="controls" role="group" aria-label="Animation playback"><button data-mode="normal">Normal</button><button data-mode="running">Run independently</button><button data-mode="paused">Pause here</button><button data-mode="stopped">Stop at cover frame</button></div><div class="stage"><img id="demo-image" src="../animated-orbit.svg" alt="A green dot orbiting a blue dot"></div><output class="status" id="status" aria-live="polite"></output></section><section><h2>code</h2><pre><code>image { image-animation: paused; }
image.style.imageAnimation = &#x27;running&#x27;;</code></pre></section><section><h2>see also</h2><ul><li><a href="/v152/css-image-animation/">Feature page</a></li><li><a href="https://chromestatus.com/feature/5078177326170112" target="_blank" rel="noopener">ChromeStatus entry</a></li></ul></section><footer class="byline">made by <a href="https://paul.kinlan.me/" target="_blank" rel="noopener">Paul Kinlan</a></footer></main><script>const image=document.querySelector('#demo-image'),status=document.querySelector('#status');const supported=CSS.supports('image-animation: paused');document.querySelector('#support-note').textContent=supported?'This browser parses image-animation.':'image-animation is unavailable here; controls still expose the attempted computed value and do not pretend playback changed.';document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{image.style.imageAnimation=b.dataset.mode;const computed=getComputedStyle(image).getPropertyValue('image-animation').trim()||'(property not exposed)';status.textContent=`Requested ${b.dataset.mode}; computed: ${computed}`;window.showcaseTelemetry?.assert('image-animation-mode',!supported||computed===b.dataset.mode,{requested:b.dataset.mode,computed,supported});}));document.querySelector('[data-mode="paused"]').click();</script></body></html>
