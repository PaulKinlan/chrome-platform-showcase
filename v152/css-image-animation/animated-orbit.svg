<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <rect width="320" height="180" rx="18" fill="#f5f2ea" />
  <circle cx="160" cy="90" r="18" fill="#0057b8" />
  <circle cx="160" cy="38" r="12" fill="#007a5e">
    <animateTransform attributeName="transform" type="rotate" from="0 160 90" to="360 160 90"
      dur="2s" repeatCount="indefinite" />
  </circle>
  <text x="160" y="165" text-anchor="middle" font-family="sans-serif"
    font-size="16">animated SVG resource</text>
</svg>
