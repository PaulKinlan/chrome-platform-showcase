name: CI

# Deno Deploy auto-deploys on push to main via its native GitHub integration,
# so we don't deploy from here. This workflow just runs the quality gates so
# bad code can't ship.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check + format check
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check server.ts

      - name: Format check
        run: deno fmt --check

      - name: Route + parity regression gate
        # Durable-demo route gate PLUS the mobile+desktop parity invariant:
        # fails on any published demo recorded broken on a supported class, on a
        # touched demo left untested/broken on a supported class, or on a
        # non-monotonic support regression — and reports mobile/desktop coverage
        # denominators. The full browser matrix is run by the build/hardening
        # routines and locally before push (deno task responsive-check); CI
        # enforces the recorded coverage + the gate.
        run: deno task check-routes

      - name: Responsive support coverage
        run: deno task responsive-support report
