name: CI

# Deno Deploy auto-deploys on push to main via its native GitHub integration,
# so we don't deploy from here. This workflow just runs the quality gates so
# bad code can't ship.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check + format check
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check server.ts

      - name: Format check
        run: deno fmt --check
