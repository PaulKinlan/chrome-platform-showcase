name: Deploy to Deno Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC auth with Deno Deploy
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check server.ts

      - name: Format check
        run: deno fmt --check

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: chrome-platform-showcase
          entrypoint: server.ts
          root: .
