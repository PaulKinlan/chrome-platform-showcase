<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 1rem; font-family: ui-monospace, monospace; font-size: 0.85rem; background: #fdfcf8; color: #000; }
    .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin-bottom: 0.3rem; }
    input[type=text] { display: block; width: 100%; padding: 0.45rem 0.6rem; margin-bottom: 0.75rem; border: 2px solid #000; font-family: ui-monospace, monospace; font-size: 0.85rem; background: #fff; color: #000; }
    input[type=text]:focus { outline: 3px solid #0022ff; outline-offset: 2px; }
    .status { padding: 0.4rem 0.6rem; border: 2px solid #000; font-size: 0.82rem; }
    .ok   { background: #d1fae5; color: #065f46; }
    .fail { background: #fee2e2; color: #7f1d1d; }
  </style>
</head>
<body>
  <p class="label">Signup form</p>
  <label for="email">Email:
    <input id="email" type="text" autofocus placeholder="autofocus fires on load" />
  </label>
  <div id="status" class="status">Checking autofocus state…</div>
  <script>
    window.addEventListener('load', () => {
      const input = document.getElementById('email');
      const focused = document.activeElement === input;
      const status = document.getElementById('status');
      status.textContent = focused ? 'autofocus activated — input has focus ✓' : 'autofocus blocked — policy denied focus ✗';
      status.className = 'status ' + (focused ? 'ok' : 'fail');
    });
  </script>
</body>
</html>
