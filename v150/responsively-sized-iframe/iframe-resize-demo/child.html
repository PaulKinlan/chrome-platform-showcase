<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg-paper);
      color: var(--text-black);
      padding: 1rem;
    }
    .block {
      background: color-mix(in srgb, var(--accent-blue) 12%, var(--bg-ivory));
      border: 1px solid var(--accent-blue);
      border-left-width: 3px;
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.5rem;
      font-size: 0.82rem;
      color: var(--accent-blue);
    }
  </style>
</head>
<body>
  <div id="content"></div>
  <script>
    const content = document.getElementById('content');
    let count = 3;

    function render() {
      content.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        const d = document.createElement('div');
        d.className = 'block';
        d.textContent = `Item ${i} — embedded content block`;
        content.appendChild(d);
      }
      // Polyfill: notify parent of height for non-Chrome-150 fallback
      window.parent.postMessage({ type: 'iframe-height', height: document.body.scrollHeight }, '*');
    }

    window.addEventListener('message', e => {
      if (e.data && typeof e.data.count === 'number') {
        count = e.data.count;
        render();
      }
    });

    render();
  </script>
</body>
</html>
